   <script>
(function () {

    let selectedUrl = "";

    // Mantém parâmetros UTM
    function buildFinalUrl(baseUrl) {
        var qs = window.location.search || "";

        if (!qs) return baseUrl;

        return baseUrl + (
            baseUrl.indexOf("?") === -1
                ? qs
                : "&" + qs.substring(1)
        );
    }

    // Seleciona cota SEM redirecionar
    document.querySelectorAll(".cota-card").forEach(function (card) {

        card.addEventListener("click", function (e) {

            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();

            // remove seleção anterior
            document.querySelectorAll(".cota-card")
                .forEach(function (c) {
                    c.classList.remove("active");
                });

            // adiciona seleção atual
            card.classList.add("active");

            // atualiza quantidade
            document.getElementById("qtdInput").value =
                card.getAttribute("data-qtd");

            // salva URL
            selectedUrl = card.getAttribute("data-url");

        }, true);

    });

    // BOTÃO COMPRAR
    document.querySelector(".btn-buy")
        .addEventListener("click", function () {

            if (!selectedUrl) {
                alert("Selecione uma cota.");
                return;
            }

            window.location.href =
                buildFinalUrl(selectedUrl);

        });

})();
</script>
